<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quinn — Coming Soon</title>
  <meta name="description" content="Quinn — studio-quality AI product photography for modern brands. Our new site is on its way." />
  <meta name="theme-color" content="#0b0b0d" />

  <!-- Open Graph -->
  <meta property="og:title" content="Quinn — Coming Soon" />
  <meta property="og:description" content="Studio-quality AI product photography for modern brands." />
  <meta property="og:type" content="website" />

  <!-- Inline SVG favicon (no extra request) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230b0b0d'/%3E%3Ccircle cx='16' cy='15' r='7' fill='none' stroke='%23c9a86a' stroke-width='2'/%3E%3Cline x1='19' y1='19' x2='23' y2='23' stroke='%23c9a86a' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b0b0d;
      --ink: #f5f1ea;
      --muted: #a39e95;
      --faint: #6c6860;
      --accent: #c9a86a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Soft warm glow behind the wordmark */
    body::before {
      content: "";
      position: absolute;
      top: 38%;
      left: 50%;
      width: min(60rem, 120vw);
      height: min(60rem, 120vw);
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(201, 168, 106, 0.16), rgba(201, 168, 106, 0) 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle vignette */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.5));
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      animation: rise 1.1s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.2rem;
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(201, 168, 106, 0.6);
      animation: pulse 2.6s ease-in-out infinite;
    }

    h1 {
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      font-weight: 400;
      font-size: clamp(3.5rem, 16vw, 9rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      margin-bottom: 1.6rem;
    }

    .tagline {
      font-size: clamp(1.05rem, 2.6vw, 1.4rem);
      color: var(--ink);
      font-weight: 400;
      max-width: 32ch;
      margin: 0 auto 1rem;
      line-height: 1.45;
    }

    .sub {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 40ch;
      margin: 0 auto;
      line-height: 1.6;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding-top: 3rem;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      color: var(--faint);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201, 168, 106, 0.5); }
      50%      { box-shadow: 0 0 0 7px rgba(201, 168, 106, 0); }
    }

    @media (prefers-reduced-motion: reduce) {
      main { animation: none; }
      .badge .dot { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <p class="badge"><span class="dot"></span> Coming soon</p>
    <h1>Quinn</h1>
    <p class="tagline">Studio-quality product photography, generated by AI.</p>
    <p class="sub">We're building something new for modern brands. Check back shortly.</p>
  </main>
  <footer>© 2026 Quinn Care Private Limited</footer>
</body>
</html>
